# .github/workflows/actualizar.yml
# ─────────────────────────────────────────────────────────────────────
# Se ejecuta automáticamente cuando se sube un archivo .WD3 a data/
# También se puede disparar manualmente desde la pestaña Actions.
# ─────────────────────────────────────────────────────────────────────

name: Actualizar Dashboard

on:
  push:
    paths:
      - 'data/*.WD3'
      - 'data/*.wd3'
  workflow_dispatch:       # permite ejecutar manualmente desde GitHub

permissions:
  contents: write          # necesario para hacer commit del index.html

jobs:
  actualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generar dashboard
        run: python generar.py

      - name: Publicar index.html actualizado
        run: |
          git config user.name  "Dashboard Bot"
          git config user.email "bot@noreply.github.com"
          git add index.html
          git diff --staged --quiet && echo "Sin cambios." || \
            git commit -m "📊 Dashboard actualizado automáticamente"
          git push
